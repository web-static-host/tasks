<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель — Технический портал</title>
    <link rel="icon" type="image/png" href="../icon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="admin-style.css">
</head>
<body class="bg-light">
    <div id="admin-screen" class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4 px-3">
        <h2 class="h4 mb-0">⚙️ Панель управления</h2>
        <button onclick="location.href='../index.html'" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> Назад к задачам
        </button>
    </div>

    <div class="row g-4">
        <div class="col-md-3 col-lg-2">
            <div class="list-group shadow-sm border-0 sticky-top" style="top: 20px;">
                <button class="list-group-item list-group-item-action active" data-bs-toggle="pill" data-bs-target="#tab-users">
                    👥 Сотрудники
                </button>
                <button class="list-group-item list-group-item-action" data-bs-toggle="pill" data-bs-target="#tab-tech-config">
                    ⚙️ Графики технарей
                </button>
                <button class="list-group-item list-group-item-action" data-bs-toggle="pill" data-bs-target="#tab-services">
                    🛠️ Каталог услуг
                </button>
            </div>
        </div>

        <div class="col-md-9 col-lg-10">
            <div class="tab-content bg-white p-4 rounded-3 shadow-sm min-vh-100">
                
                <div class="tab-pane fade show active" id="tab-users">
    <div class="d-flex flex-wrap align-items-center justify-content-between gap-3 mb-3 pb-3 border-bottom">
        
        <div class="d-flex align-items-center gap-3">
            <select id="role-filter" class="form-select form-select-sm" style="width: 160px;" onchange="filterAdminUsers()">
                <option value="">Все роли</option>
                <option value="Администратор">Администратор</option>
                <option value="Менеджер">Менеджер</option>
                <option value="Технический специалист">Технический специалист</option>
                <option value="Технический специалист 1С">Технический специалист 1С</option>
                <option value="Руководитель">Руководитель</option>

            </select>

            <div class="form-check form-switch mb-0">
                <input class="form-check-input" type="checkbox" id="hide-inactive-check" onchange="saveActiveFilterState()">
                <label class="form-check-label small fw-bold" for="hide-inactive-check">Только активные</label>
            </div>
        </div>

        <div class="d-flex align-items-center gap-2 flex-grow-1 justify-content-md-end" style="max-width: 400px;">
            <div class="input-group input-group-sm">
                <span class="input-group-text bg-white border-end-0 text-muted">🔍</span>
                <input type="text" id="user-search" class="form-control border-start-0" 
                       placeholder="Поиск" oninput="filterAdminUsers()" style="box-shadow: none; border-color: #dee2e6;">
            </div>
            <button class="btn btn-primary btn-sm text-nowrap" onclick="openAddUserModal()">+ Добавить</button>
        </div>
    </div>

    <div id="admin-users-list">
        </div>
</div>

                <div class="tab-pane fade" id="tab-tech-config">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0">⚙️ Графики работы технарей</h5>
    </div>
    
    <div id="admin-tech-list" class="row g-3">
        </div>
</div>

<div class="modal fade" id="techScheduleModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
            <div class="modal-header">
                <h5 class="modal-title">Настройка графика</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="tech-schedule-form">
                    <input type="hidden" id="sch-user-id">
                    
                    <div class="row g-3">
                        <div class="col-6">
                            <label class="form-label small fw-bold">Начало работы</label>
                            <input type="time" id="sch-work-start" class="form-control" required>
                        </div>
                        <div class="col-6">
                            <label class="form-label small fw-bold">Конец (Пн-Чт)</label>
                            <input type="time" id="sch-work-end" class="form-control" required>
                        </div>
                        <div class="col-6">
                            <label class="form-label small fw-bold">Конец (Пт)</label>
                            <input type="time" id="sch-work-friday" class="form-control" required>
                        </div>
                        <div class="col-6">
                            <label class="form-label small fw-bold">Интервал (мин)</label>
                            <select id="sch-slot" class="form-select">
                                <option value="15">15 мин</option>
                                <option value="30" selected>30 мин</option>
                                <option value="60">1 час</option>
                            </select>
                        </div>
                        <div class="col-12"><hr class="my-1"></div>
                        <div class="col-6">
                            <label class="form-label small fw-bold">Обед с</label>
                            <input type="time" id="sch-lunch-start" class="form-control" required>
                        </div>
                        <div class="col-6">
                            <label class="form-label small fw-bold">Обед до</label>
                            <input type="time" id="sch-lunch-end" class="form-control" required>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                <button type="button" class="btn btn-primary" onclick="saveTechSchedule()">Сохранить график</button>
            </div>
        </div>
    </div>
</div>

<div class="tab-pane fade" id="tab-services">
    <div class="d-flex flex-wrap justify-content-between align-items-end gap-3 mb-4 border-bottom pb-3">
        <div>
            <h4 class="mb-1 fw-bold text-dark">Каталог услуг</h4>
            <p class="text-muted small mb-0">Управление категориями и регламентами времени</p>
        </div>
        <div class="input-group input-group-sm bg-white rounded-pill shadow-sm overflow-hidden" style="width: 280px; border: 1px solid #e9ecef;">
            <span class="input-group-text bg-transparent border-0 text-muted ps-3"><i class="bi bi-search"></i></span>
            <input type="text" id="catalogSearch" class="form-control border-0 shadow-none bg-transparent" placeholder="Поиск услуг..." oninput="renderCatalog()">
        </div>
    </div>

    <ul class="nav nav-pills catalog-pills mb-4" id="catalogTabs" role="tablist">
        <li class="nav-item">
            <button class="nav-link active" id="paid-tab" data-bs-toggle="pill" data-bs-target="#tab-content-paid" type="button">Платные</button>
        </li>
        <li class="nav-item">
            <button class="nav-link" id="free-tab" data-bs-toggle="pill" data-bs-target="#tab-content-free" type="button">Бесплатные</button>
        </li>
        <li class="nav-item">
            <button class="nav-link" id="demo-tab" data-bs-toggle="pill" data-bs-target="#tab-content-demo" type="button">Демо</button>
        </li>
    </ul>

    <div class="tab-content" id="catalogTabContent">
        <div class="tab-pane fade show active" id="tab-content-paid">
            <div id="accordionPaid"></div>
        </div>
        <div class="tab-pane fade" id="tab-content-free">
            <div id="accordionFree"></div>
        </div>
        <div class="tab-pane fade" id="tab-content-demo">
            <div id="accordionDemo"></div>
        </div>
    </div>
</div>

<div class="modal fade" id="catalogModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header border-bottom-0 pb-0">
                <h5 class="modal-title fw-bold">Добавить услугу</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="catalog-form">
                    <input type="hidden" id="cat-id">
                    <input type="hidden" id="cat-type"> <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">Категория</label>
                        <input type="text" id="cat-category" class="form-control form-control-lg bg-light border-0" placeholder="Например: 1С-ЭДО" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">Название услуги</label>
                        <input type="text" id="cat-name" class="form-control form-control-lg bg-light border-0" placeholder="Например: Настройка рабочего места" required>
                    </div>
                    <div class="row mb-3">
                        <div class="col-6">
                            <label class="form-label small fw-bold text-muted">Время (минут)</label>
                            <input type="number" id="cat-duration" class="form-control form-control-lg bg-light border-0" value="30" step="30" min="30">
                        </div>
                        <div class="col-6 d-flex align-items-center mt-3">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="cat-is-active" checked style="transform: scale(1.2);">
                                <label class="form-check-label ms-2 small fw-bold" for="cat-is-active">Активна</label>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-top-0 pt-0">
                <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Отмена</button>
                <button type="button" class="btn btn-primary rounded-pill px-4 shadow-sm" onclick="saveCatalogItem()">Сохранить</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="userModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
            <div class="modal-header">
                <h5 class="modal-title" id="userModalTitle">Сотрудник</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="user-form">
                    <input type="hidden" id="edit-user-id">
                    <div class="mb-3">
                        <label class="form-label small fw-bold">ФИО полностью</label>
                        <input type="text" id="user-fullname-input" class="form-control" placeholder="Иванов Иван Иванович" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Email (Логин)</label>
                        <input type="email" id="user-email" class="form-control" placeholder="ivanov@mail.ru" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Пароль</label>
                        <div class="input-group">
                            <input type="text" id="user-password" class="form-control" placeholder="Минимум 8 символов">
                            <button class="btn btn-outline-secondary" type="button" onclick="generatePassword()">🎲</button>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Отдел</label>
                        <select id="user-dept-select" class="form-select" required>
                            <option value="">Загрузка отделов...</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Роли в системе</label>
                        <div id="roles-checkboxes" class="p-2 border rounded bg-light" style="max-height: 120px; overflow-y: auto;">
                            </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                <button type="button" class="btn btn-primary" onclick="saveUser()" id="save-user-btn">Сохранить</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="editUserModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
            <div class="modal-header">
                <h5 class="modal-title" id="editUserModalTitle">Редактировать сотрудника</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="edit-user-form">
                    <input type="hidden" id="edit-user-id-hidden">
                    <div class="mb-3">
                        <label class="form-label small fw-bold">ФИО полностью</label>
                        <input type="text" id="edit-user-fullname" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Email (Логин)</label>
                        <input type="email" id="edit-user-email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Пароль</label>
                        <div class="input-group">
                            <input type="password" id="edit-user-password" class="form-control" placeholder="••••••••" readonly>
                            <button class="btn btn-outline-secondary" type="button" onclick="openPasswordChangeMiniModal()" title="Изменить пароль">✏️</button>
                            <button class="btn btn-outline-primary" type="button" onclick="copyEditAuthData()" title="Копировать Логин/Пароль">📋</button>
                        </div>
                        <small id="edit-pass-status" class="text-warning d-none">Пароль изменен! Не забудьте сохранить.</small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Отдел</label>
                        <select id="edit-user-dept-select" class="form-select" required>
                            </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Роли в системе</label>
                        <div id="edit-roles-checkboxes" class="p-2 border rounded bg-light" style="max-height: 120px; overflow-y: auto;">
                            </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                <button type="button" class="btn btn-primary" onclick="saveEditedUser()" id="save-edit-btn">Сохранить изменения</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="changePasswordModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-sm modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
            <div class="modal-header py-2">
                <h6 class="modal-title">Новый пароль</h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="input-group">
                    <input type="text" id="new-edit-password" class="form-control form-control-sm" placeholder="Сгенерировать новый пароль ->">
                    <button class="btn btn-sm btn-outline-secondary" onclick="generatePasswordInMiniModal()">🎲</button>
                </div>
                <div class="mt-2 text-center">
                    <button class="btn btn-sm btn-secondary me-2" data-bs-dismiss="modal">Отмена</button>
                    <button class="btn btn-sm btn-primary" onclick="confirmNewPassword()">Применить</button>
                </div>
            </div>
        </div>
    </div>
</div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="../config.js"></script>

    <script src="users.js"></script>
    <script src="admin.js"></script>
    <script src="schedules.js"></script>
    <script src="katalog.js"></script>
</body>
</html>
