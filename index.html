<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель управления задачами</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Оставляю пустым, как ты и просил */
    </style>
</head>
<body id="app-body" style="display: none;">
    <div id="auth-screen" class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow border-0" style="border-radius: 15px;">
                <div class="card-body text-center p-4">
                    <div class="mb-4">
                        <h4 class="fw-bold">Технический портал</h4>
                        <p class="text-muted small">Введите данные для входа</p>
                    </div>
                    
                    <form id="login-form" onsubmit="login(event)">
                        <div class="mb-3">
                            <input type="text" id="username" name="username" class="form-control" 
                                   placeholder="Логин" required autocomplete="username">
                        </div>
                        <div class="mb-3">
                            <input type="password" id="password" name="password" class="form-control" 
                                   placeholder="Пароль" required autocomplete="current-password">
                        </div>
                        <div class="form-check text-start mb-3 small">
                            <input class="form-check-input" type="checkbox" id="rememberMe" checked>
                            <label class="form-check-label" for="rememberMe">
                                Запомнить меня
                            </label>
                        </div>
                        <button type="submit" id="login-btn" class="btn btn-primary w-100 py-2 shadow-sm">
                            Войти
                        </button>
                    </form>
                    
                    <div id="login-error" class="alert alert-danger mt-3 d-none small p-2">
                        Неверный логин или пароль
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

    <div id="main-content" style="display: none;">
        <nav class="navbar navbar-dark bg-dark">
            <div class="container d-flex justify-content-between align-items-center">
                <span class="navbar-brand">Технический портал</span>
                
                <div class="d-flex align-items-center">
                    <a id="admin-link" class="text-light me-3 d-none" title="Панель администратора" style="cursor: pointer;">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="admin-gear" viewBox="0 0 16 16">
            <path d="M9.405 1.05c-.413-1.4-2.397-1.4-2.81 0l-.1.34a1.464 1.464 0 0 1-2.105.872l-.31-.17c-1.283-.698-2.686.705-1.987 1.987l.169.311c.446.82.023 1.841-.872 2.105l-.34.1c-1.4.413-1.4 2.397 0 2.81l.34.1a1.464 1.464 0 0 1 .872 2.105l-.17.31c-.698 1.283.705 2.686 1.987 1.987l.311-.169a1.464 1.464 0 0 1 2.105.872l.1.34c.413 1.4 2.397 1.4 2.81 0l.1-.34a1.464 1.464 0 0 1 2.105-.872l.31.17c1.283.698 2.686-.705 1.987-1.987l-.169-.311a1.464 1.464 0 0 1 .872-2.105l.34-.1c1.4-.413 1.4-2.397 0-2.81l-.34-.1a1.464 1.464 0 0 1-.872-2.105l.17-.31c.698-1.283-.705-2.686-1.987-1.987l-.311.169a1.464 1.464 0 0 1-2.105-.872l-.1-.34zM8 10.93a2.929 2.929 0 1 1 0-5.86 2.929 2.929 0 0 1 0 5.858z"/>
        </svg>
    </a>
                    <span id="user-info" class="badge bg-secondary me-3"></span>
                    <button onclick="logout()" class="btn btn-sm btn-outline-light">Выйти</button>
                </div>
            </div>
        </nav>

        <div class="container">
            <div class="filter-panel shadow-sm mb-4 bg-white rounded">
                <div class="border-bottom px-3 pt-2">
                    <ul class="nav nav-tabs border-0" id="taskTypeTabs" role="tablist">
                        <li class="nav-item">
                            <button class="nav-link active fw-bold text-uppercase" id="paid-tasks-tab" data-bs-toggle="tab" type="button">Платные задачи</button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link fw-bold text-uppercase" id="free-tasks-tab" data-bs-toggle="tab" type="button">Бесплатные</button>
                        </li>
                    </ul>
                </div>

                <div class="p-3">
                    <div id="tech-filters-container" class="mb-3 d-none border-bottom pb-3">
                        <div class="d-flex align-items-center gap-3 flex-wrap">
                            <small class="text-muted fw-bold text-uppercase">Исполнители:</small>
                            <div class="btn-group flex-wrap" id="tech-filters" role="group"></div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                        <div class="d-flex align-items-center gap-2">
                            <div class="btn-group" role="group">
                                <input type="radio" class="btn-check" name="filterDate" id="filterAll" value="all" checked>
                                <label class="btn btn-outline-primary" for="filterAll">Все</label>
                                <input type="radio" class="btn-check" name="filterDate" id="filterToday" value="today">
                                <label class="btn btn-outline-primary" for="filterToday">Сегодня</label>
                                <input type="radio" class="btn-check" name="filterDate" id="filterTomorrow" value="tomorrow">
                                <label class="btn btn-outline-primary" for="filterTomorrow">Завтра</label>
                            </div>
                            <input type="date" id="filterCustomDate" class="form-control" style="width: auto;">
                        </div>

                        <div class="d-flex align-items-center flex-grow-1 justify-content-end gap-3">
                            <div class="form-check form-switch d-inline-block ms-3" id="only-my-tasks-container">
    <input class="form-check-input" type="checkbox" id="onlyMyTasks">
    <label class="form-check-label" for="onlyMyTasks">Мои задачи</label>
</div>
                            <div class="form-check form-switch mb-0">
                                <input class="form-check-input" type="checkbox" id="hideDone">
                                <label class="form-check-label" for="hideDone">Скрыть выполненные</label>
                            </div>
                            
                            <div class="search-container">
                                <div class="input-group-custom">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="search-icon" viewBox="0 0 16 16">
                                        <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/>
                                    </svg>
                                    <input type="text" id="taskSearch" class="form-search" placeholder="Поиск...">
                                </div>
                            </div>

                            <button id="busy-task-btn" type="button" class="btn btn-secondary-blue shadow-sm d-none" data-bs-toggle="modal" data-bs-target="#busyModal">
    + Занять время
</button>

                            <button id="add-task-btn" type="button" class="btn btn-primary shadow-sm" data-bs-toggle="modal" data-bs-target="#taskModal">
                                + Новая задача
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm border-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th id="th-dept">Отдел</th>
                                <th id="th-user-role">Менеджер</th>
                                <th>Продукт</th>
                                <th>Задача</th>
                                <th>ИНН</th>
                                <th>Битрикс24</th>
                                <th>Дата и время</th>
                                <th id="th-comment">Примечание</th>
                                <th>Стоимость</th>
                                <th>Статус</th>
                                <th class="text-center">Действие</th>
                            </tr>
                        </thead>
                        <tbody id="task-list"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>


    
<div class="modal fade" id="taskModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg"> <div class="modal-content border-0 shadow-lg">
            <div class="modal-header py-2">
                <h5 class="modal-title">Постановка задачи</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body pt-0">
                <form id="task-form">
                    <div class="py-2 mb-2 bg-light rounded border d-flex justify-content-center">
                        <div class="btn-group w-75" role="group">
                            <input type="radio" class="btn-check" name="modalTaskType" id="modalTypePaid" value="paid" checked>
                            <label class="btn btn-sm btn-outline-primary" for="modalTypePaid">Платная</label>
                            
                            <input type="radio" class="btn-check" name="modalTaskType" id="modalTypeFree" value="free">
                            <label class="btn btn-sm btn-outline-primary" for="modalTypeFree">Бесплатная</label>
                        </div>
                    </div>

                    <div class="row g-3">
                        <div class="col-md-6">
                            <div class="step mb-2">
                                <label class="form-label fw-bold mb-1 small">1. Тип работы и исполнитель</label>
                                <select id="category" class="form-select form-select-sm mb-2" required>
                                    <option value="">Выберите категорию...</option>
                                </select>
                                <select id="taskName" class="form-select form-select-sm mb-2" required>
                                    <option value="">Выберите задачу...</option>
                                </select>
                                <select id="specialist" class="form-select form-select-sm" required>
                                    <option value="">Выберите специалиста...</option>
                                </select>
                            </div>

                            <div class="step mb-2">
                                <label class="form-label fw-bold mb-1 small">2. Клиент и оплата</label>
                                <input type="text" id="inn" class="form-control form-control-sm mb-2" placeholder="ИНН клиента" required>
                                <input type="url" id="bitrix" class="form-control form-control-sm mb-2" placeholder="Ссылка на Битрикс24" required>
                                <div id="priceBlock" class="input-group input-group-sm">
                                    <span class="input-group-text">₽</span>
                                    <input type="number" id="price" class="form-control" placeholder="Стоимость" required>
                                </div>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <div id="dateTimeBlock" class="step mb-2">
    <div class="row g-2">
        <div class="col-4">
            <label class="form-label fw-bold mb-1 small">Дата</label>
            <input type="text" id="date" class="form-control" placeholder="00.00.0000">
        </div>
        <div class="col-4">
            <label class="form-label fw-bold mb-1 small">Время</label>
            <select id="time" class="form-select" disabled>
                <option value="">--:--</option>
            </select>
        </div>
        <div class="col-4">
            <label class="form-label fw-bold mb-1 small">Длительность</label>
            <input type="time" id="taskDuration" class="form-control" 
                   value="00:30" min="00:30" step="1800">
        </div>
    </div>

    <div id="commentBlock" class="mt-2">
        <label class="form-label fw-bold mb-1 small">Примечание</label>
        <textarea class="form-control form-control-sm" id="taskComment" rows="2" maxlength="55"
                   placeholder='Например: "Клиент на месте до 14:00", "Можно раньше" или "Можно в любое время"'></textarea>
    </div>
</div>
                        </div>
                    </div>

                    <div id="changeLogBlock" class="mt-2 p-2 bg-warning bg-opacity-10 border rounded d-none">
                        <label class="form-label fw-bold small mb-1 text-danger">Причина изменения (в историю)</label>
                        <textarea class="form-control form-control-sm" id="historyComment" rows="1" 
                                  placeholder="Например: Перенос по просьбе клиента"></textarea>
                    </div>
                    

                    <div class="mt-3">
                        <button type="submit" class="btn btn-success w-100 py-2 shadow-sm" id="submit-btn">Сохранить</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>


    <div class="modal fade" id="rescheduleModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header">
                    <h5 class="modal-title">Перенос #<span id="reschedule-id-label"></span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="reschedule-task-id">
                    <input type="hidden" id="reschedule-spec-name">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Новая дата</label>
                        <input type="text" id="new-date" class="form-control" placeholder="Выберите дату">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Доступное время</label>
                        <select id="new-time" class="form-select" disabled>
                            <option value="">Выберите дату...</option>
                        </select>
                    </div>
                    <div class="mb-3">
        <label class="form-label fw-bold">Причина переноса</label>
        <textarea id="reschedule-comment" class="form-control" rows="2" placeholder="Введите причину..."></textarea>
    </div>
                    <button id="confirm-reschedule-btn" onclick="confirmReschedule()" class="btn btn-warning w-100 fw-bold" disabled>Подтвердить</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="busyModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius: 15px;">
            <div class="modal-header">
                <h5 class="modal-title">Занять время / Отсутствие</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="busy-form">
                    <div class="mb-3">
                        <label class="form-label">Тип отсутствия</label>
                        <select id="busy-type-select" class="form-select">
                            <option value="slot">Конкретное время (внутри дня)</option>
                            <option value="full-day">Весь рабочий день</option>
                            <option value="range">Несколько дней (Отпуск/Отгул)</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Дата / Период</label>
                        <input type="text" id="busy-date" class="form-control" placeholder="Выберите даты" required>
                    </div>

                    <div id="busy-time-fields">
                        <div class="mb-3">
                            <label class="form-label">Время начала</label>
                            <select id="busy-time" class="form-select" disabled>
                                <option value="">Сначала выберите дату...</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Длительность</label>
                            <input type="time" id="busy-duration" class="form-control" value="00:30">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Примечание (причина)</label>
                        <textarea id="busy-comment" class="form-control" rows="2" placeholder="Обед, Отгул, Больничный..."></textarea>
                    </div>

                    <button type="submit" id="busy-submit-btn" class="btn btn-primary w-100" style="border-radius: 15px;">
                        Зафиксировать
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>


    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ru.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>


    <!-- Конфигурация проекта: хранит настройки Supabase, список пользователей, роли (менеджер/технарь) и основные параметры системы -->
    <script src="config.js"></script>

    <!-- Авторизация: отвечает за вход в систему, выход, хранение текущего пользователя, показ основного интерфейса после логина -->
    <script src="auth.js"></script>

    <!-- Фильтры и вкладки: управление переключением платных/бесплатных задач, фильтрами по технарям, датам, поиском и сохранением настроек фильтра -->
    <script src="filters.js"></script>

    <!-- Временные слоты: генерация свободного времени, работа календаря, поиск доступных интервалов для задач и обновление времени -->
    <script src="time-slots.js"></script>

    <!-- Действия с задачами: изменение статуса, перенос задачи, удаление, копирование, открытие Bitrix, работа кнопок управления задачами -->
    <script src="task-actions.js"></script>

    <!-- Форма задачи: создание новой задачи, редактирование существующей, переключение платная/бесплатная, категории, длительность, логика полей формы -->
    <script src="task-form.js"></script>

    <!-- Таблица задач: загрузка задач из Supabase, отображение таблицы, группировка по датам, история изменений, прокрутка к текущему дню -->
    <script src="tasks-table.js"></script>

    <!-- Занятие времени тех спецом /отпуск /больничный /встреча -->
    <script src="tech-busy.js"></script>
</body>
</html>
